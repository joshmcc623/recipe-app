<!DOCTYPE html>
<html>

<head>
    <title>New Recipe</title>
</head>

<body>
    <h1>Add a Recipe</h1>
    <form method="POST">
        <label>Title: <input type="text" name="title" required></label><br>
        <label>Description: <textarea name="description"></textarea></label><br>
        <label>Prep time (min): <input type="number" name="prep_time"></label><br>
        <label>Cook time (min): <input type="number" name="cook_time"></label><br>
        <label>Servings: <input type="number" name="servings"></label><br>
        <label>Instructions: <textarea name="instructions"></textarea></label><br>
        <button type="submit">Save Recipe</button>
    </form>
</body>

</html>
